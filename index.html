<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicGuide | Indian Lok Sabha Election Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="src/css/animations.css">
</head>
<body>
    <div class="app-container">
        <!-- Minimal Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                CivicGuide
            </div>
            <nav class="nav-links">
                <a href="#dashboard" class="nav-link active" id="nav-dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    Overview
                </a>
                <a href="#timeline" class="nav-link" id="nav-timeline">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Election Map
                </a>
                <a href="#guide" class="nav-link" id="nav-guide">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                    Voter Library
                </a>
                <a href="#verify" class="nav-link" id="nav-verify">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    Verification
                </a>
            </nav>
        </aside>

        <!-- Aesthetic Main Content -->
        <main class="main-content">
            <header class="animate-up">
                <div>
                    <h1>Lok Sabha 2024</h1>
                    <p class="header-subtitle">Your gateway to the world's largest election.</p>
                </div>
                <button id="btn-register" style="background: var(--primary-indigo); color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer;">Register Now</button>
            </header>

            <section id="content-area">
                <!-- All views injected dynamically by app.js -->
            </section>
        </main>
    </div>

    <!-- Aesthetic Chat -->
    <div id="chat-widget" class="chat-widget">
        <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h4 style="margin: 0;">Assistant</h4>
                <p style="margin: 0; font-size: 0.75rem; color: var(--text-secondary);">Ready to help</p>
            </div>
            <button id="chat-close-btn" style="background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 5px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="chat-messages" class="chat-messages">
            <div class="message assistant">Namaste. I'm here to guide you through the election process. What can I clarify for you today?</div>
        </div>
        <form id="chat-form" class="chat-input-area" style="display: flex; gap: 0.5rem; align-items: center; margin: 0; padding: 1rem; border-top: 1px solid var(--border-subtle);">
            <input type="text" id="user-input" placeholder="Type a message..." style="flex: 1; background: var(--bg-surface); border: 1px solid var(--border-subtle); padding: 0.75rem; border-radius: var(--radius-sm); color: #fff;">
            <button type="submit" id="chat-send-btn" style="background: var(--primary-indigo); border: none; padding: 0.75rem; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; min-width: 44px; min-height: 44px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </form>
    </div>

    <div id="chat-trigger" class="chat-trigger">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>

    <script src="src/js/electionData.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
